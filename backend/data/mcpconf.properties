# mcpconf.properties — MCP AI & RAG Configuration
# Auto-saved by Settings UI

# AI / LLM
llm.url              = http://localhost:11434
llm.model            = qwen2.5
llm.temperature      = 0.2
llm.max_tokens       = 2048
llm.intent_mode      = hybrid
llm.confidence       = 0.7
llm.timeout          = 15
llm.rag_keywords     = SOP,incident,runbook,playbook,guide,documentation,report,policy,procedure,postmortem

# RAG Server
rag.base_url         = http://localhost:8000
rag.data_endpoint    = /data
rag.ask_endpoint     = /ask
rag.metadata_file    = metadata.json
rag.timeout          = 30

# File Storage
rag.upload_folder    = storage/uploads
rag.vector_store     = storage/vectors
rag.bm25_store       = storage/bm25

# Config Paths
rag.instructions_file = config/instructions.md
rag.faq_file          = config/faq.json
rag.settings_file     = config/settings.yaml

# Search & Ranking
search.embed_model    = bge-small-en-v1.5
search.chunk_size     = 512
search.chunk_overlap  = 64
search.top_k          = 8
search.bm25_weight    = 0.4
search.sem_weight     = 0.6
search.rerank_enabled = true
search.rerank_model   = bge-reranker-base
search.top_n          = 3

# Cache
cache.enabled         = true
cache.sim_threshold   = 0.92
cache.size            = 1024
cache.ttl             = 3600

# Performance
perf.gpu_threshold    = 85