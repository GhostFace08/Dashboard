# apmconf.properties — APM Tool Connection Configuration
# Auto-saved by Settings UI

# ── DynaTrace ─────────────────────────────────────────────────────────────────
dynatrace.enabled    = true
dynatrace.base_url   = https://abc12345.live.dynatrace.com
dynatrace.endpoint   = /api/v2/problems
dynatrace.timeout    = 30
dynatrace.collection = file
dynatrace.data_file  = backend/data/all_issues.json

# ── OPManager ─────────────────────────────────────────────────────────────────
opmanager.enabled    = true
opmanager.base_url   = https://opm.corp.local:8080
opmanager.endpoint   = /api/json/alarm
opmanager.timeout    = 30
opmanager.collection = file
opmanager.data_file  = backend/data/all_issues.json

# ── AppDynamics ─────────────────────────────────────────────────────────────────
appdynamics.enabled    = true
appdynamics.base_url   = https://corp.saas.appdynamics.com
appdynamics.endpoint   = /controller/rest/applications
appdynamics.timeout    = 30
appdynamics.collection = file
appdynamics.data_file  = backend/data/all_issues.json

# ── HEAL ─────────────────────────────────────────────────────────────────
heal.enabled    = true
heal.base_url   = https://heal.corp.local
heal.endpoint   = /api/v1/incidents
heal.timeout    = 30
heal.collection = file
heal.data_file  = backend/data/all_issues.json
