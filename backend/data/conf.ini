# conf.ini — MCP Dashboard General Configuration
# Auto-saved by Settings UI

[logging]
log_level      = INFO
log_file       = logs/agent.log
log_max_size   = 10485760
log_backups    = 5

[dashboard]
periodic_fetch_time = 15 min
periodic_check_time = 300
ui_refresh_interval = 1
landing_view        = dashboard
default_sort        = startTime-desc
show_acknowledged   = false
show_resolved       = true
compact_mode        = false
density             = comfortable
theme               = dark

[notifications]
notif_desktop       = true
notif_sound         = false
notif_critical_only = true