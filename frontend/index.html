<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    /* Apply stored theme before first paint — prevents flash of wrong theme */
    (function () {
      try {
        var t = localStorage.getItem("mcp-theme");
        if (t === "dark" || t === null) document.documentElement.classList.add("dark");
      } catch (e) {}
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- Shared design tokens and atoms -->
  <link rel="stylesheet" href="css/shared.css" />

  <!--
    Config / API / common loaded in the shell so Utils.initHeader() is
    available on DOMContentLoaded.  Each iframe also loads its own copies —
    that is fine; each iframe is an isolated document.
  -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;       /* shell never scrolls — pages scroll inside frames */
      background: var(--background);
    }

    /* ── App shell ─────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header injected by common.js/Utils.initHeader() */
    #header-root {
      flex-shrink: 0;
    }

    /* Frame container fills remaining height */
    #frame-container {
      flex: 1 1 0;
      min-height: 0;
      position: relative;
    }

    /* ── Page iframes ──────────────────────────────────────────── */
    /*
     * All four iframes are loaded once at startup and kept alive forever.
     * display:none still lets the document parse, execute scripts, and build
     * its DOM — it just is not painted.  State is fully preserved across
     * tab switches.  Only the active frame is display:block.
     */
    .page-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: var(--background);
    }

    .page-frame.active {
      display: block;
    }
  </style>
</head>
<body>
<div id="app">

  <!--
    Shared header — common.js injects #app-header here.
    Page iframes detect (window !== window.top) and skip rendering their own
    header, so the shell header is always the single source of truth.
  -->
  <div id="header-root"></div>

  <!--
    Persistent page iframes.
    Adjust src paths here if your pages live in a different folder.
  -->
  <div id="frame-container">
    <iframe id="frame-dashboard"
            class="page-frame"
            src="pages/dashboard.html"
            title="Dashboard"></iframe>

    <iframe id="frame-ai-chat"
            class="page-frame"
            src="pages/ai_chat.html"
            title="AI Chat"></iframe>

    <iframe id="frame-ai-monitoring"
            class="page-frame"
            src="pages/ai_monitoring.html"
            title="AI Monitoring"></iframe>

    <iframe id="frame-settings"
            class="page-frame"
            src="pages/settings.html"
            title="Settings"></iframe>
  </div>

</div><!-- /#app -->

<script>
(function () {
  "use strict";

  /* ─────────────────────────────────────────────────────────────────────
     CONFIGURATION
     Tab ids must match the data-tab attributes injected by common.js
     and the href detection logic in common.js's PATH_TO_TAB map.
  ───────────────────────────────────────────────────────────────────── */
  var TAB_TO_FRAME = {
    "dashboard":     "frame-dashboard",
    "ai-chat":       "frame-ai-chat",
    "ai-monitoring": "frame-ai-monitoring",
    "settings":      "frame-settings"
  };

  var DEFAULT_TAB = "dashboard";

  /* ─────────────────────────────────────────────────────────────────────
     STATE
  ───────────────────────────────────────────────────────────────────── */
  var activeTabId     = null;

  /*
   * Track which tabs have ever been activated.
   * The shell passes isFirstActivation=true on the very first showTab()
   * call for each tab.  ai_monitoring.js uses this to decide whether to
   * fetch data (only on first activation, never again).
   */
  var activatedOnce = {};

  /* ─────────────────────────────────────────────────────────────────────
     showTab(tabId)

     1. Swap which iframe is visible (CSS class toggle)
     2. Update active highlight on shared header tab links
     3. Call frame's window.onTabActivated(isFirstActivation) if present
  ───────────────────────────────────────────────────────────────────── */
  function showTab(tabId) {
    if (!TAB_TO_FRAME[tabId]) {
      console.warn("[Shell] Unknown tab id:", tabId);
      return;
    }

    /* 1 — Swap frame visibility */
    Object.keys(TAB_TO_FRAME).forEach(function (id) {
      var frame = document.getElementById(TAB_TO_FRAME[id]);
      if (!frame) return;
      frame.classList.toggle("active", id === tabId);
    });

    /* 2 — Update header tab active state */
    document.querySelectorAll(".header-tab").forEach(function (link) {
      var isActive = (link.dataset.tab === tabId);
      link.classList.toggle("active", isActive);
      link.setAttribute("aria-current", isActive ? "page" : "false");

      /* Manage the check icon — add when active, remove when not */
      var existingIcon = link.querySelector("[data-lucide='check']");
      if (isActive && !existingIcon) {
        var icon = document.createElement("i");
        icon.setAttribute("data-lucide", "check");
        icon.style.cssText = "width:14px;height:14px;display:block;flex-shrink:0";
        link.insertBefore(icon, link.firstChild);
        if (window.lucide) lucide.createIcons({ nodes: [icon] });
      } else if (!isActive && existingIcon) {
        existingIcon.remove();
      }
    });

    activeTabId = tabId;

    /* 3 — Notify the frame it is now visible */
    var frameEl = document.getElementById(TAB_TO_FRAME[tabId]);
    if (frameEl && frameEl.contentWindow) {
      try {
        var cw = frameEl.contentWindow;
        if (typeof cw.onTabActivated === "function") {
          var isFirst = !activatedOnce[tabId];
          activatedOnce[tabId] = true;
          cw.onTabActivated(isFirst);
        }
      } catch (e) {
        console.warn("[Shell] onTabActivated error for tab", tabId, e);
      }
    }
  }

  /* ─────────────────────────────────────────────────────────────────────
     THEME PROPAGATION

     When the user toggles the theme from the shell header, push the new
     class into every frame document immediately, even hidden ones.
     common.js's toggleTheme() calls window.Shell.propagateTheme(theme).
  ───────────────────────────────────────────────────────────────────── */
  function propagateThemeToFrames(theme) {
    Object.values(TAB_TO_FRAME).forEach(function (frameId) {
      var frame = document.getElementById(frameId);
      if (!frame) return;
      try {
        var htmlEl = frame.contentDocument && frame.contentDocument.documentElement;
        if (!htmlEl) return;
        if (theme === "dark") {
          htmlEl.classList.add("dark");
        } else {
          htmlEl.classList.remove("dark");
        }
      } catch (e) { /* cross-origin guard — safe to ignore for same-origin pages */ }
    });
  }

  /* ─────────────────────────────────────────────────────────────────────
     PUBLIC SURFACE
     Exposed so common.js and page scripts can call shell functions.
  ───────────────────────────────────────────────────────────────────── */
  window.Shell = {
    showTab:        showTab,
    getActiveTab:   function () { return activeTabId; },
    propagateTheme: propagateThemeToFrames
  };

  /* ─────────────────────────────────────────────────────────────────────
     INIT
  ───────────────────────────────────────────────────────────────────── */
  document.addEventListener("DOMContentLoaded", function () {

    /* Render the shared header into #header-root.
       Pass DEFAULT_TAB so the initial active highlight is correct before
       any tab switch.  The shell's click handler then owns updates. */
    if (window.Utils && typeof Utils.initHeader === "function") {
      Utils.initHeader(DEFAULT_TAB);
    } else {
      console.error("[Shell] Utils.initHeader not found — ensure common.js loaded before this script.");
    }

    /* Intercept header tab clicks — prevent navigation, call showTab() */
    var headerRoot = document.getElementById("header-root");
    if (headerRoot) {
      headerRoot.addEventListener("click", function (e) {
        var link = e.target.closest(".header-tab");
        if (!link) return;
        e.preventDefault();
        var tabId = link.dataset.tab;
        if (tabId && tabId !== activeTabId) {
          showTab(tabId);
        }
      });
    }

    /* Show default tab on first load */
    showTab(DEFAULT_TAB);
  });

})();
</script>
</body>
</html>
